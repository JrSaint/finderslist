<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      width: 600px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(99,102,241,0.35);
    }
    .icon-wrap span {
      font-size: 42px;
      line-height: 1;
    }
    .wordmark {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .wordmark-main {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .wordmark-sub {
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="icon-wrap">
      <span>🔍</span>
    </div>
    <div class="wordmark">
      <div class="wordmark-main">FindersList</div>
      <div class="wordmark-sub">AI Tools Directory</div>
    </div>
  </div>
</body>
</html>
