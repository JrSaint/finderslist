name: Integrity Audit (weekly)

# Cheap, deterministic weekly health check — no LLM, no data edits.
# Flags confirmed-dead links (404/410), cross-domain redirects (rebrands),
# duplicate slugs, invalid categories, missing fields. Bot-blocked URLs
# (403/429) are reported as info, not failures. Findings appear in the run's
# step summary + a warning annotation + the report artifact (+ email digest).
# The run only goes red if the script itself crashes.
on:
  schedule:
    # 07:00 UTC every Monday
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      dir:
        description: "Single directory route to check (blank = all)"
        required: false
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install nodemailer --no-save
      - name: Run integrity audit
        run: node scripts/audit-integrity.mjs ${{ github.event.inputs.dir && format('--dir {0}', github.event.inputs.dir) || '' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrity-report
          path: audit-logs/integrity-*.md
          if-no-files-found: ignore
